<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 1200px; background: #09090B; font-family: 'Inter', sans-serif; overflow: hidden; }
  .root {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
    padding: 100px;
    position: relative;
  }
  .accent {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #6366F1, #818cf8, #6366F1);
  }
  .headline {
    font-size: 54px; font-weight: 800; color: #FAFAFA;
    line-height: 1.15; letter-spacing: -0.03em; margin-bottom: 56px;
  }
  .headline em { font-style: normal; color: #6366F1; }
  .steps {
    display: flex; flex-direction: column; gap: 24px; width: 100%;
  }
  .step {
    display: flex; align-items: center; gap: 24px;
    background: #18181B; border: 1px solid #27272A; border-radius: 16px;
    padding: 28px 36px;
  }
  .step-active {
    background: linear-gradient(135deg, rgba(99,102,241,0.10), rgba(99,102,241,0.04));
    border-color: rgba(99,102,241,0.3);
  }
  .step-num {
    width: 44px; height: 44px; border-radius: 12px;
    background: #27272A; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #71717A; flex-shrink: 0;
  }
  .step-active .step-num {
    background: #6366F1; color: white;
  }
  .step-text { font-size: 22px; font-weight: 500; color: #A1A1AA; }
  .step-active .step-text { color: #E4E4E7; }
  .step-meta {
    margin-left: auto; font-size: 14px; font-weight: 600; color: #3F3F46;
    text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0;
  }
  .step-active .step-meta { color: #6366F1; }
  .logo-row {
    position: absolute; bottom: 80px; left: 100px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 9px;
    background: linear-gradient(135deg, #6d6ff5, #6366F1);
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 20px; height: 20px; }
  .logo-text { font-size: 18px; font-weight: 700; color: #A1A1AA; letter-spacing: -0.01em; }
</style>
</head>
<body>
<div class="root">
  <div class="accent"></div>

  <h1 class="headline">4 questions. <em>Once.</em><br/>Your voice — forever.</h1>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">What are you building?</div>
      <div class="step-meta">Company</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">What stage are you at?</div>
      <div class="step-meta">Context</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">Who are you writing for?</div>
      <div class="step-meta">Audience</div>
    </div>
    <div class="step step-active">
      <div class="step-num">4</div>
      <div class="step-text">How do you sound at your best?</div>
      <div class="step-meta">Voice Layer</div>
    </div>
  </div>

  <div class="logo-row">
    <div class="logo-mark">
      <svg viewBox="0 0 32 32" fill="none"><path d="M18 5L8 18h8l-2 9 10-13h-8l2-9z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/></svg>
    </div>
    <span class="logo-text">wrively.com</span>
  </div>
</div>
</body>
</html>
