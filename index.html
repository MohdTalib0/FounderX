<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Primary meta -->
    <title>FounderX - LinkedIn posts that sound like you</title>
    <meta name="description" content="FounderX builds your founder persona and writes LinkedIn posts in your voice. Stop staring at a blank page. 3 post variations, ready in under 3 minutes." />
    <meta name="author" content="FounderX" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://founderx.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FounderX" />
    <meta property="og:url" content="https://founderx.app/" />
    <meta property="og:title" content="FounderX - LinkedIn posts that sound like you" />
    <meta property="og:description" content="Build your founder brand on LinkedIn in 3 minutes a day. FounderX writes posts in your voice - never stare at a blank page again." />
    <meta property="og:image" content="https://founderx.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FounderX - LinkedIn posts that sound like you" />
    <meta name="twitter:description" content="Build your founder brand on LinkedIn in 3 minutes a day. FounderX writes posts in your voice." />
    <meta name="twitter:image" content="https://founderx.app/og.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "FounderX",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "AI-powered LinkedIn content tool that writes posts in the founder's voice. Builds a founder persona, generates 3 post variations per topic, and helps founders show up consistently on LinkedIn.",
      "url": "https://founderx.app",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free beta access"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
