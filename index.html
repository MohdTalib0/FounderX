<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QMPW6C9NKN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-QMPW6C9NKN');
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Primary meta (overridden per-page by react-helmet-async) -->
    <title>Wrively • AI That Sounds Like You | LinkedIn Voice Layer</title>
    <meta name="description" content="Wrively is the Voice Layer for LinkedIn. Build your voice once in 4 questions. Get posts that sound like you, every week, in under 3 minutes. Free to start." />
    <meta name="author" content="Wrively" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://wrively.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Wrively" />
    <meta property="og:url" content="https://wrively.com/" />
    <meta property="og:title" content="Wrively • AI That Sounds Like You | LinkedIn Voice Layer" />
    <meta property="og:description" content="Wrively is the Voice Layer for LinkedIn. Build your voice once. Get posts that sound like you, every week, in under 3 minutes." />
    <meta property="og:image" content="https://wrively.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wrively • AI That Sounds Like You | LinkedIn Voice Layer" />
    <meta name="twitter:description" content="Wrively is the Voice Layer for LinkedIn. Build your voice once. Get posts that sound like you, every week, in under 3 minutes." />
    <meta name="twitter:image" content="https://wrively.com/og.png" />

    <!-- Structured data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Wrively",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Wrively is the Voice Layer for LinkedIn. It builds your voice once from 4 questions, then writes every LinkedIn post from it • 3 variations per topic, ready in under 3 minutes.",
      "url": "https://wrively.com",
      "screenshot": "https://wrively.com/og.png",
      "featureList": [
        "Voice Layer persona that persists across all posts",
        "3 post variations per topic: Safe, Bold, Spicy",
        "Rewrite Draft • turn rough notes into a polished post",
        "Get Comments • smart, on-brand comments for any post",
        "30-day to unlimited post history"
      ],
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD",
          "description": "12 posts per month, 15 comment suggestions, 5 draft rewrites"
        },
        {
          "@type": "Offer",
          "name": "Starter",
          "price": "9",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "price": "9",
            "priceCurrency": "USD",
            "unitText": "MONTH"
          },
          "description": "80 posts per month, 100 comment suggestions, 40 draft rewrites"
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "19",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "price": "19",
            "priceCurrency": "USD",
            "unitText": "MONTH"
          },
          "description": "Unlimited posts, comments, and rewrites. Priority AI. Performance insights."
        }
      ]
    }
    </script>

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Wrively",
      "url": "https://wrively.com",
      "logo": "https://wrively.com/favicon.svg",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@wrively.com",
        "contactType": "customer support"
      },
      "sameAs": []
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
